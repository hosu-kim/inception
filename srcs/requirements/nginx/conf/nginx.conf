# events: key settings
events {
    worker_connections 1024; # how many connections it processes
}

# http: all the rules for running a website
http {
    include mime.types; # extension information: .jpg, .js, .css ...
    # Nginx 사전에 등록되지 않은 정체불명의 파일은 그냥 안전하게 이진 데이터로 취급해서 사용자가 다운로드
    default_type application/octet-stream;

    # Virtual Server definition
    server {
        listen 443 ssl; # to HTTPS
        listen [::]:443 ssl; # for IPv6 connections
        server_name hoskim.42.fr; # only hoskim.42.fr connection

        ssl_protocols TLSv1.2 TLSv1.3; # protocol for security
        ssl_certificate /etc/nginx/ssl/inception.crt; # location of certificate (공개키)
        ssl_certificate_key /etc/nginx/ssl/inception.key; # 비밀키: 서버 증명용

        root /var/www/html; # location of website files
        index index.php index.html index.htm; # index: Priority list

        # hoskim.42.fr/ 뒤에 뭐가 붙든 일단 다 이 구역으로 들어와서 처리한다.
        # $uri: 요청한 파일이 실제로 폴더에 있는지
        # $uri/: 그 이름으로 된 폴더가 있는지
        location / {
            try_files $uri $uri/ /index.php?$args;
        }

        # PHP 파일을 어떻게 실행할지 정의
        location ~ \.php$ {
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass wordpress:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }
    }
}
